<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brain Tumor Predictor</title>
</head>
<body>
    <h1>Brain Tumor Prediction</h1>
    <input type="file" id="imageInput" accept="image/*">
    <button onclick="sendImage()">Predict</button>
    <p id="result"></p>

    <script>
        async function sendImage() {
            const input = document.getElementById('imageInput').files[0];
            if (!input) { alert("Select an image first"); return; }

            const formData = new FormData();
            formData.append('file', input);

            const response = await fetch('/predict', { method: 'POST', body: formData });
            const data = await response.json();

            document.getElementById('result').innerText = 
                `Prediction: ${data.prediction}\nConfidence: ${data.confidence.toFixed(2)}`;
        }
    </script>
</body>
</html>
